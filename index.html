<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест 9 Мая</title>
    <style>
        body {
            margin: 0;
            background: #05060A;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            background: #05060A;
        }
    </style>
</head>
<body>
<canvas id="c" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const W = canvas.width;
const H = canvas.height;

function drawTest() {
    // фон
    ctx.fillStyle = "#151623";
    ctx.fillRect(0, 0, W, H);

    // простой прямоугольник ленты
    ctx.fillStyle = "#FF8C00";
    ctx.fillRect(0, H*0.6, W, 30);

    // текст
    ctx.fillStyle = "#FFFFFF";
    ctx.textAlign = "center";
    ctx.font = "bold 40px Arial";
    ctx.fillText("9 Мая", W/2, 100);
    ctx.font = "bold 32px Arial";
    ctx.fillText("С Днём Победы!", W/2, H - 60);
}
drawTest();
</script>
</body>
</html>
