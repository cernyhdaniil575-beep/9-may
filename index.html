<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>С Днём Победы! 9 Мая</title>
    <style>
        body {
            margin: 0;
            background: #111111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        canvas {
            background: #111111;
        }
    </style>
</head>
<body>
<canvas id="victoryCanvas" width="900" height="600"></canvas>

<script>
const canvas = document.getElementById("victoryCanvas");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;

// ---------- георгиевская лента ----------
// классический чёрно-оранжевый узор с тройными чёрными полосами [web:187][web:190]
function drawRibbon(offset = 0) {
    // лента — диагональная полоса снизу слева вверх направо
    const stripeWidth = 20;
    const bands = [
        "#000000", "#FF8C00", "#000000",
        "#FF8C00", "#000000"
    ];

    // рисуем широкую полосу через множество параллельных линий
    // используем сдвиг offset для лёгкой "волны"
    const baseYShift = Math.sin(offset) * 8; // небольшая волна

    ctx.save();
    ctx.translate(-200, baseYShift);  // чуть выносим за левый край
    ctx.rotate(-Math.PI / 6);         // наклон ~30°
    
    for (let i = 0; i < bands.length; i++) {
        ctx.fillStyle = bands[i];
        ctx.fillRect(0, i * stripeWidth, W * 1.6, stripeWidth);
    }

    ctx.restore();
}

// ---------- звезда ----------
function drawStar(cx, cy, outerR, innerR, fill, stroke) {
    ctx.save();
    ctx.beginPath();
    ctx.fillStyle = fill;
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 3;

    for (let i = 0; i < 10; i++) {
        const angle = Math.PI / 2 + i * Math.PI / 5; // 5-конечная звезда
        const r = i % 2 === 0 ? outerR : innerR;
        const x = cx + r * Math.cos(angle);
        const y = cy - r * Math.sin(angle);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }

    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();
}

// ---------- лавровые ветви (упрощённо) ----------
function drawLaurelBranch(cx, cy, scaleX, flipY = 1) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(scaleX, flipY);
    ctx.strokeStyle = "#C0C000";
    ctx.fillStyle = "#C0C000";
    ctx.lineWidth = 2;

    // стебель
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(40, -20, 80, -60);
    ctx.stroke();

    // листья по стеблю
    for (let i = 0; i < 6; i++) {
        const t = i / 5;
        const bx = 0 + 80 * t;
        const by = 0 - 60 * t;

        ctx.beginPath();
        ctx.ellipse(bx, by, 14, 6, Math.PI / 4, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.ellipse(bx, by - 10, 14, 6, -Math.PI / 4, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.restore();
}

// ---------- текст ----------
function drawText() {
    // "С Днём Победы!"
    ctx.fillStyle = "#FFFFFF";
    ctx.textAlign = "center";

    ctx.font = "bold 42px Arial";
    ctx.fillText("С Днём Победы!", W / 2, H - 80);

    ctx.font = "bold 32px Arial";
    ctx.fillStyle = "#FFD700";
    ctx.fillText("9 Мая", W / 2, H - 35);
}

// ---------- основная отрисовка и анимация ----------
let t = 0;

function drawFrame() {
    ctx.clearRect(0, 0, W, H);

    // фон — лёгкий радиальный градиент
    const grad = ctx.createRadialGradient(
        W / 2, H / 2, 50,
        W / 2, H / 2, 500
    );
    grad.addColorStop(0, "#222222");
    grad.addColorStop(1, "#000000");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // георгиевская лента
    drawRibbon(t * 0.03);

    // звезда в центре сверху
    const starPulse = 1 + 0.05 * Math.sin(t * 0.1);
    drawStar(W / 2, H / 2 - 80, 60 * starPulse, 25 * starPulse, "#FFCC00", "#CC9900");

    // лавровые ветви снизу от звезды [web:183]
    drawLaurelBranch(W / 2 - 80, H / 2 + 10, 1, 1);   // левая
    drawLaurelBranch(W / 2 + 80, H / 2 + 10, -1, 1);  // правая (зеркально)

    // текст
    drawText();

    t += 1;
    requestAnimationFrame(drawFrame);
}

drawFrame();
</script>
</body>
</html>
