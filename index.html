<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>9 Мая — С Днём Победы!</title>
    <style>
        body {
            margin: 0;
            background: #05060A;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        canvas {
            background: #05060A;
        }
    </style>
</head>
<body>
<canvas id="victoryCanvas" width="960" height="600"></canvas>

<script>
const canvas = document.getElementById("victoryCanvas");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;

// ---------- фон ----------
function drawBackground() {
    const grad = ctx.createRadialGradient(
        W / 2, H / 2, 50,
        W / 2, H / 2, 600
    );
    grad.addColorStop(0, "#151623");
    grad.addColorStop(0.5, "#05060A");
    grad.addColorStop(1, "#000000");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // немного "огоньков" на фоне
    ctx.fillStyle = "rgba(255, 215, 0, 0.15)";
    for (let i = 0; i < 40; i++) {
        const x = Math.random() * W;
        const y = Math.random() * (H * 0.6);
        const r = Math.random() * 2 + 0.5;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
    }
}

// ---------- георгиевская лента (волной) ----------
function drawRibbon(t) {
    const baseY = H * 0.6;
    const amplitude = 35;
    const stripeWidth = 18;
    const bands = ["#000000", "#FF8C00", "#000000", "#FF8C00", "#000000"];

    for (let b = 0; b < bands.length; b++) {
        ctx.strokeStyle = bands[b];
        ctx.lineWidth = stripeWidth;
        ctx.beginPath();
        for (let x = -50; x <= W + 50; x += 5) {
            const phase = (x + b * 10) / 140 + t * 0.03;
            const y = baseY + Math.sin(phase) * amplitude + (b - 2) * (stripeWidth - 4);
            if (x === -50) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
    }
}
